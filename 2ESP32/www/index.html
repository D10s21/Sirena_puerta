<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ESP32 Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <div class="container py-4">
        <h2 id="appName" class="text-info">Cargando...</h2>
        <small id="appVersion" class="text-muted"></small>
        <hr>
        <h5>Señales locales</h5>
        <div id="signals" class="mb-4"></div>
        <h5>Sensor remoto (ESP32 #1)</h5>
        <div id="sensorSignals" class="mb-4"></div>
        <h5>Reglas</h5>
        <div id="rules"></div>
    </div>
    <script src="/app.js"></script>
</body>
</html>
